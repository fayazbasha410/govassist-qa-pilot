concurrency: 1
description: GovMurshid UAE Government Services RAG Eval — English + Arabic

providers:
  - id: http
    config:
      url: http://localhost:3000/api/chat
      method: POST
      headers:
        Content-Type: application/json
      body:
        message: "{{input}}"
      transformResponse: |
        (json) => json.reply

prompts:
  - "{{input}}"

tests:

  # ── DRIVING ────────────────────────────────────────────
  - description: "GD-001 Driving license renewal requirements"
    vars:
      input: "How do I renew my driving license in the UAE?"
    assert:
      - type: llm-rubric
        value: "The response provides helpful information about driving license renewal and mentions at least one required document such as Emirates ID or eye test"
      - type: not-contains
        value: "I don't know"

  - description: "GD-002 Vehicle registration documents"
    vars:
      input: "What are the requirements for renewing vehicle registration in UAE?"
    assert:
      - type: llm-rubric
        value: "The response mentions at least one requirement such as insurance, Emirates ID, or vehicle inspection"
      - type: not-contains
        value: "I don't know"

  - description: "GD-003 Traffic fines payment Dubai"
    vars:
      input: "How do I pay my traffic fines in Dubai?"
    assert:
      - type: llm-rubric
        value: "The response mentions at least one payment method or authority such as Dubai Police, RTA, or an app"
      - type: not-contains
        value: "I don't know"

  # ── IDENTITY ───────────────────────────────────────────
  - description: "GD-004 Emirates ID expiry penalties"
    vars:
      input: "What is the fine for having an expired Emirates ID?"
    assert:
      - type: llm-rubric
        value: "The response mentions a fine or penalty for expired Emirates ID, such as AED 20 per day or a maximum cap"
      - type: not-contains
        value: "no penalty"

  - description: "GD-005 Residency visa renewal documents"
    vars:
      input: "What documents do I need to renew my UAE residency visa?"
    assert:
      - type: llm-rubric
        value: "The response mentions at least two required documents such as passport, Emirates ID, or medical fitness certificate"
      - type: not-contains
        value: "I don't know"

  - description: "GD-006 Golden Visa eligibility"
    vars:
      input: "Who can apply for the UAE Golden Visa and how long is it valid?"
    assert:
      - type: llm-rubric
        value: "The response mentions at least one eligible category such as investors or entrepreneurs, and mentions the visa duration"
      - type: not-contains
        value: "I don't know"

  # ── HOUSING ────────────────────────────────────────────
  - description: "GD-007 Ejari registration Dubai"
    vars:
      input: "How do I register my rental contract in Dubai?"
    assert:
      - type: llm-rubric
        value: "The response mentions Ejari as the tenancy registration system in Dubai"
      - type: not-contains
        value: "I don't know"

  - description: "GD-008 Tawtheeq registration Abu Dhabi"
    vars:
      input: "How do I register my rental contract in Abu Dhabi?"
    assert:
      - type: llm-rubric
        value: "The response provides helpful information about registering a rental or tenancy contract in Abu Dhabi and mentions Tawtheeq or TAMM"
      - type: not-contains
        value: "I don't know"

  # ── HEALTHCARE ─────────────────────────────────────────
  - description: "GD-009 Health insurance mandatory Dubai"
    vars:
      input: "Is health insurance mandatory for residents in Dubai?"
    assert:
      - type: llm-rubric
        value: "The response clearly states that health insurance is mandatory in Dubai and mentions the employer's responsibility or DHA"
      - type: not-contains
        value: "optional"

  - description: "GD-010 Medical fitness certificate tests"
    vars:
      input: "What medical tests are done for the UAE fitness certificate?"
    assert:
      - type: llm-rubric
        value: "The response mentions at least two tests such as blood test, chest X-ray, or physical examination"
      - type: not-contains
        value: "I don't know"

  # ── EDUCATION ──────────────────────────────────────────
  - description: "GD-011 School enrollment Dubai KHDA"
    vars:
      input: "What is the process for enrolling a child in a Dubai school?"
    assert:
      - type: llm-rubric
        value: "The response mentions KHDA as the Dubai school regulator and mentions required documents"
      - type: not-contains
        value: "I don't know"

  - description: "GD-012 Abu Dhabi school regulator"
    vars:
      input: "Which authority regulates private schools in Abu Dhabi?"
    assert:
      - type: llm-rubric
        value: "The response correctly identifies ADEK or Abu Dhabi Department of Education and Knowledge as the regulator"
      - type: not-contains
        value: "KHDA"

  # ── BUSINESS ───────────────────────────────────────────
  - description: "GD-013 Trade license renewal Dubai"
    vars:
      input: "What is the process and penalty for late trade license renewal in Dubai?"
    assert:
      - type: llm-rubric
        value: "The response mentions the renewal process and a late penalty or fine amount"
      - type: not-contains
        value: "I don't know"

  - description: "GD-014 VAT registration threshold"
    vars:
      input: "When must a UAE business register for VAT and what is the threshold?"
    assert:
      - type: llm-rubric
        value: "The response mentions AED 375,000 as the mandatory VAT registration threshold or mentions the Federal Tax Authority"
      - type: not-contains
        value: "no VAT"

  # ── SOCIAL ─────────────────────────────────────────────
  - description: "GD-015 Expatriate end of service gratuity"
    vars:
      input: "How is end of service gratuity calculated for expatriate employees in UAE?"
    assert:
      - type: llm-rubric
        value: "The response explains gratuity calculation mentioning 21 days per year for first 5 years or 30 days thereafter"
      - type: not-contains
        value: "no benefits"

  # ── ARABIC CASES ───────────────────────────────────────
  - description: "GD-016 Arabic — driving license renewal"
    vars:
      input: "كيف أجدد رخصة القيادة في الإمارات؟"
    assert:
      - type: llm-rubric
        value: "The response is in Arabic and provides information about driving license renewal mentioning required documents or steps"
      - type: not-contains
        value: "I don't know"

  - description: "GD-017 Arabic — Emirates ID fine"
    vars:
      input: "ما هي غرامة انتهاء صلاحية الهوية الإماراتية؟"
    assert:
      - type: llm-rubric
        value: "The response is in Arabic and mentions a fine or penalty for expired Emirates ID"
      - type: not-contains
        value: "I don't know"

  - description: "GD-018 Arabic — health insurance Dubai"
    vars:
      input: "هل التأمين الصحي إلزامي في دبي؟"
    assert:
      - type: llm-rubric
        value: "The response is in Arabic and confirms that health insurance is mandatory in Dubai"
      - type: not-contains
        value: "I don't know"

  - description: "GD-019 Arabic — Ejari registration"
    vars:
      input: "كيف أسجل عقد الإيجار في دبي؟"
    assert:
      - type: llm-rubric
        value: "The response is in Arabic and mentions Ejari or the tenancy registration process in Dubai"
      - type: not-contains
        value: "I don't know"

  - description: "GD-020 Arabic — Golden Visa"
    vars:
      input: "من يحق له التقدم للحصول على الإقامة الذهبية في الإمارات؟"
    assert:
      - type: llm-rubric
        value: "The response is in Arabic and mentions eligible categories for the Golden Visa such as investors or entrepreneurs"
      - type: not-contains
        value: "I don't know"

# Scoring — use Groq as judge (replaces Ollama)
defaultTest:
  options:
    provider:
      id: groq:llama-3.1-8b-instant
      config:
        apiKey: "{{env.GROQ_API_KEY}}"