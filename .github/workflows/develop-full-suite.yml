name: Full Test Suite (Develop)

on:
  push:
    branches: [ develop ]

jobs:
  full-playwright:
    name: Full Playwright Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run full Playwright suite
        run: npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-playwright-report
          path: playwright-report/
          retention-days: 14

  regression-gate:
    name: RAG Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: full-playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm install -g promptfoo

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run regression gate
        run: npm run eval:regression

  red-team:
    name: Adversarial Red Team
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: full-playwright

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run red team
        run: npm run eval:redteam