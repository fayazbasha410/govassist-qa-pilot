name: PR Checks

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  # ── Job 1: Playwright UI + API tests ──────────────────
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start GovMurshid server
        run: |
          npm start &
          sleep 3
          curl -f http://localhost:3000/api/health || exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Job 2: Guardrail smoke test ───────────────────────
  guardrail-smoke:
    name: Guardrail Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: playwright-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start GovMurshid server
        run: |
          npm start &
          sleep 3

      - name: Run red team suite
        run: npm run eval:redteam

  # ── Job 3: Schema validation ──────────────────────────
  schema-validation:
    name: API Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate policy data
        run: |
          node -e "
          const p = require('./src/data/policies');
          console.log('Total policies:', p.length);
          if (p.length < 35) { console.error('Missing policies!'); process.exit(1); }
          for (const pol of p) {
            if (!pol.id || !pol.title || !pol.content) {
              console.error('Invalid policy:', pol.id);
              process.exit(1);
            }
          }
          console.log('All policies valid');
          "

      - name: Validate test data
        run: |
          node -e "
          const td = require('./tests/data/testData');
          const required = ['PLATES', 'APPOINTMENTS', 'GUARDRAIL_INPUTS', 'CHAT_MESSAGES'];
          for (const key of required) {
            if (!td[key]) { console.error('Missing:', key); process.exit(1); }
          }
          console.log('Test data valid');
          "