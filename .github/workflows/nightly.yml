name: Nightly Quality Gate

on:
  schedule:
    - cron: '0 1 * * *'  # 1 AM UTC every night (5 AM UAE time)
  workflow_dispatch:       # also allow manual trigger

jobs:
  nightly-full-eval:
    name: Full RAG Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm install -g promptfoo

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run full eval
        run: npm run eval

      - name: Run regression gate
        run: npm run eval:regression

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-eval-${{ github.run_number }}
          path: /tmp/govmurshid-eval.json
          retention-days: 30

  nightly-red-team:
    name: Nightly Red Team
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run red team
        run: npm run eval:redteam

  nightly-accessibility:
    name: Nightly Accessibility Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2

      - name: Start server
        run: |
          npm start &
          sleep 3

      - name: Run accessibility tests
        run: npx playwright test tests/specs/ui/accessibility.spec.js

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-a11y-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30